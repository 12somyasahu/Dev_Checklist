function buildPanel(key) {
  const tech = data[key];
  const total = tech.sections.reduce((a, s) => a + s.items.length, 0);
  let html = `
    <div class="progress-label">
      <span>Progress</span>
      <span id="prog-label-${key}">0 / ${total} completed</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar-${key}" style="width:0%"></div></div>
    <div class="grid2">
  `;
  tech.sections.forEach((sec, si) => {
    html += `<div class="section">
      <div class="section-title"><i class="ti ${sec.icon}" aria-hidden="true"></i> ${sec.title}</div>
      <div class="items">`;
    sec.items.forEach((item, ii) => {
      const id = `${key}-${si}-${ii}`;
      html += `<div class="item" id="item-${id}" onclick="toggle('${key}','${id}','${total}')">
        <div class="checkbox" id="cb-${id}"></div>
        <div>
          <div class="item-label">${item.label}</div>
          ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div><button class="reset-btn" onclick="resetPanel('${key}','${total}')"><i class="ti ti-refresh" aria-hidden="true"></i> Reset checklist</button>`;
  return html;
}

const panels = document.getElementById('panels');
Object.keys(data).forEach(key => {
  const div = document.createElement('div');
  div.className = 'panel' + (key === 'nextjs' ? ' active' : '');
  div.id = 'panel-' + key;
  div.innerHTML = buildPanel(key);
  panels.appendChild(div);
});

const checked = {};
function toggle(key, id, total) {
  checked[id] = !checked[id];
  const item = document.getElementById('item-' + id);
  item.classList.toggle('checked', checked[id]);
  updateProgress(key, total);
}
function updateProgress(key, total) {
  const done = Object.keys(checked).filter(k => k.startsWith(key + '-') && checked[k]).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-bar-' + key).style.width = pct + '%';
  document.getElementById('prog-label-' + key).textContent = done + ' / ' + total + ' completed';
}
function resetPanel(key, total) {
  Object.keys(checked).forEach(k => { if (k.startsWith(key + '-')) checked[k] = false; });
  document.querySelectorAll(`#panel-${key} .item`).forEach(el => el.classList.remove('checked'));
  updateProgress(key, total);
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
});
</script>
